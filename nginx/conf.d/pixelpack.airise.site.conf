# ── PixelPack 站点（网关 airc-nginx 托管）──────────────────────────
# 前端 SPA 与上传文件由网关直接 serve；后端 api 经共享网络 airise-web 按容器名反代。
# 部署：同步到 /opt/nginx/conf.d/ ，网关挂载该目录到 /etc/nginx/conf.d。

# ── HTTPS ──
server {
    listen 443 ssl;
    http2 on;
    server_name pixelpack.airise.site;

    # 通配证书 *.airise.site（DNS-01 签发，见 docs/technology/260719-nginx部署架构.md §8）
    # 若暂用单域证书，路径改为 /etc/letsencrypt/live/pixelpack.airise.site/
    ssl_certificate     /etc/letsencrypt/live/airise.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/airise.site/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;

    # SPA 静态（网关直发）
    root  /var/www/pixelpack;
    index index.html;

    # 上传体积上限（物品图片 / 头像等）
    client_max_body_size 25m;

    # 后端 API + WS 信令（/api/rtc/signal）
    location /api/ {
        proxy_pass http://pixelpack-api:8000;   # 容器名，需同在 airise-web 网络
        include /etc/nginx/snippets/proxy.conf;
    }

    # 上传 / 预览文件：nginx 直发（sendfile，比后端 StaticFiles 高效）
    location /uploads/ {
        alias /var/www/pixelpack-uploads/;
        autoindex off;
        add_header Content-Disposition "inline";   # 预览：浏览器内联展示图片 / PDF
    }

    # SPA history 路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── 80 → 443 强制跳转 ──
server {
    listen 80;
    server_name pixelpack.airise.site;
    return 301 https://$host$request_uri;
}
