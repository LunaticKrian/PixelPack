# 反代到后端容器的通用参数。
# 每个 proxy_pass 的 location 用 `include /etc/nginx/snippets/proxy.conf;` 引入。
# 涵盖：WebSocket 升级、原始头透传、SSE/WS 关缓冲、长超时。

proxy_http_version 1.1;

# WebSocket 升级（对普通 HTTP / SSE 无害；$connection_upgrade 见 00-upgrade-map.conf）
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection $connection_upgrade;

# 透传原始请求信息
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;

# SSE / WebSocket 流式数据必须关缓冲，否则消息积压到连接结束才吐出
proxy_buffering off;
proxy_cache off;

# 大文件上传 / 慢客户端 / 长会话
proxy_read_timeout 600s;
proxy_send_timeout 600s;
