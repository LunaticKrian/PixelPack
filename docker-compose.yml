# ── PixelPack 部署编排（网关托管模式）─────────────────────────────────
# 架构：前端 SPA 由 web 服务（多阶段镜像：node 构建 → nginx serve）提供，
#       网关 airc-nginx 反代 location / 到 web 容器；/api、/uploads 由网关直发。
#       上传文件仍由网关从宿主机路径只读直发。
#       详见 docs/technology/260719-nginx部署架构.md
#
# 前端构建：随 `docker compose up -d --build web` 完成，无需宿主机 node 环境。
#
# 密钥：./server/.env 由 env_file 注入（不进镜像、不进 git）。

services:
  api:
    build: ./server
    image: pixelpack-api
    container_name: pixelpack-api
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      # 持久化到挂载卷，避免容器重建丢库 / 丢文件
      DATABASE_URL: "sqlite+aiosqlite:////app/data/data.db"
      # 写入 /app/data/uploads；网关以只读方式挂载同一路径直接 serve
      UPLOAD_DIR: "/app/data/uploads"
    volumes:
      - ./data:/app/data
    networks:
      - airise-web
    # 不对主机暴露端口；外部一律经 airc-nginx 网关访问

  web:
    build: ./web
    image: pixelpack-web
    container_name: pixelpack-web
    restart: unless-stopped
    networks:
      - airise-web
    # 不对主机暴露端口；外部一律经 airc-nginx 网关访问
    # 纯静态服务，运行期不依赖 api，故不加 depends_on

networks:
  airise-web:
    external: true
