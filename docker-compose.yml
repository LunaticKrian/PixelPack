# ── PixelPack 部署编排（网关托管模式）─────────────────────────────────
# 架构：前端 SPA 与上传文件由统一的 airc-nginx 网关直接 serve，
#       本 compose 只跑后端 api，并接入共享网络 airise-web 供网关按容器名反代。
#       详见 docs/technology/260719-nginx部署架构.md
#
# 前端构建：在服务器上 `cd web && npm run build`，产物 web/dist 由网关挂载直发。
#
# 密钥：./server/.env 由 env_file 注入（不进镜像、不进 git）。

services:
  api:
    build: ./server
    image: pixelpack-api
    container_name: pixelpack-api
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      # 持久化到挂载卷，避免容器重建丢库 / 丢文件
      DATABASE_URL: "sqlite+aiosqlite:////app/data/data.db"
      # 写入 /app/data/uploads；网关以只读方式挂载同一路径直接 serve
      UPLOAD_DIR: "/app/data/uploads"
    volumes:
      - ./data:/app/data
    networks:
      - airise-web
    # 不对主机暴露端口；外部一律经 airc-nginx 网关访问

networks:
  airise-web:
    external: true
