# ── PixelPack 前端 nginx 配置 ─────────────────────────────────────────
# 1. 提供构建好的静态文件（SPA，history 路由回退 index.html）
# 2. /api/*、/uploads/* 反代到后端服务 `api:8000`（docker-compose 服务名）
# 注意：后端路由本身带 /api 前缀，这里 proxy_pass 不带尾部路径，原样透传 URI。

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 上传体积：物品图片 / 头像等，给到 25MB
    client_max_body_size 25m;

    # ---- API 反代 ----
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # chat 接口为 SSE 流式（text/event-stream）：
        # 必须关闭缓冲，否则消息会积压到连接结束才一次性吐出。
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ---- 上传文件反代（由后端 StaticFiles 提供）----
    location /uploads/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- SPA 静态资源 + history 回退 ----
    location / {
        try_files $uri $uri/ /index.html;
    }
}
