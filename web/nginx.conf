# ── PixelPack 前端容器 nginx 站点 ─────────────────────────────────────
# 仅 HTTP：TLS 由共享网关 airc-nginx 终结，本容器只在 airise-web 内网被反代。
# 职责：SPA history 回退（createWebHistory 需要）、gzip、vite 哈希资源长缓存。

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip 压缩文本类资源
    gzip on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               application/xml text/javascript image/svg+xml;

    # vite 产物带内容哈希，可永久强缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA history 路由回退：找不到文件时回落到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
