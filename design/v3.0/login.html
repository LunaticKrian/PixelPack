<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 · PixelPack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Pixelify+Sans:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="login" data-layout="auth">
  <div class="ambient" aria-hidden="true"><div class="ambient__grid"></div><div class="ambient__dust"></div></div>
  <div class="auth__scanlines" aria-hidden="true"></div>
  <div class="auth__sweep" aria-hidden="true"></div>

  <div class="auth">
    <div class="auth-card">
      <div class="auth__header">
        <div class="auth__title">PIXELPACK</div>
        <div class="auth__sub">~ 物品管理 ~</div>
        <div class="auth__coin">投币开始游戏</div>
      </div>

      <div class="sec-title" style="margin-bottom:16px"><span class="t-pixel t-accent">&gt;</span> <span>登录</span> <span class="auth__cursor t-accent">_</span></div>

      <form onsubmit="event.preventDefault(); notify('登录中…', 'ok'); setTimeout(()=>location.href='index.html',600)">
        <div class="field">
          <label class="field__label">用户名</label>
          <input class="input" type="text" value="krian" autocomplete="username" />
        </div>
        <div class="field">
          <label class="field__label">密码</label>
          <input class="input" type="password" value="••••••••" autocomplete="current-password" />
        </div>
        <button class="btn btn--primary btn--block" type="submit">▶ 登录</button>
      </form>

      <div class="sec-divider">或</div>
      <div style="text-align:center;font-size:13px" class="t-dim">还没有账号？<a class="t-accent" href="register.html" style="font-weight:700">注册 →</a></div>

      <div class="auth__footer">© 2026 PixelPack <span class="auth__cursor">_</span></div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
